const SCALE_MIN = -0.2;
const SCALE_MAX = 0.7;
const SCALE_RANGE = SCALE_MAX - SCALE_MIN;

function getStrengthColor(r, domainColor) {
  const abs = Math.abs(r);
  if (abs >= 0.5) return domainColor;
  if (abs >= 0.3) return domainColor + "cc";
  if (abs >= 0.1) return domainColor + "66";
  return "#e5e7eb";
}

function CorrelationBar({ r, p, n, maxWidth = 200, domainColor, isExpected }) {
  const abs = Math.abs(r);
  const zeroX = ((0 - SCALE_MIN) / SCALE_RANGE) * maxWidth;
  const thresholdX = ((0.3 - SCALE_MIN) / SCALE_RANGE) * maxWidth;
  const barWidth = (abs / SCALE_RANGE) * maxWidth;
  const barLeft = r >= 0 ? zeroX : zeroX - barWidth;
  const sig = p < 0.05;
  const barColor = r >= 0 ? getStrengthColor(r, domainColor) : "#d1d5db";

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 0 }}>
      <div
        style={{
          width: maxWidth,
          height: 22,
          background: "#f3f4f6",
          borderRadius: 4,
          position: "relative",
          overflow: "hidden",
          flexShrink: 0,
        }}
      >
        <div
          style={{
            position: "absolute",
            left: barLeft,
            width: Math.max(barWidth, 2),
            height: "100%",
            background: barColor,
            borderRadius: 4,
            transition: "left 0.4s ease, width 0.4s ease",
          }}
        />
        <div
          style={{
            position: "absolute",
            left: zeroX,
            top: 0,
            bottom: 0,
            width: 0,
            borderLeft: "2px solid #000000",
          }}
        />
        <div
          style={{
            position: "absolute",
            left: thresholdX,
            top: 0,
            bottom: 0,
            width: 0,
            borderLeft: "2px dashed #0A2A65",
            opacity: 0.45,
          }}
        />
      </div>
      <span
        style={{
          fontFamily: "'Inter', -apple-system, sans-serif",
          fontSize: 13,
          fontWeight: 600,
          color: sig ? "#000000" : "#9ca3af",
          width: 44,
          textAlign: "right",
          flexShrink: 0,
          marginLeft: 8,
        }}
      >
        {r.toFixed(2)}
      </span>
      <span
        style={{
          width: 28,
          textAlign: "center",
          flexShrink: 0,
          marginLeft: 6,
        }}
      >
        {!sig && (
          <span
            style={{
              fontSize: 10,
              color: "#d97706",
              fontWeight: 500,
              background: "#fef3c7",
              padding: "1px 5px",
              borderRadius: 3,
            }}
          >
            ns
          </span>
        )}
      </span>
      <span
        style={{
          fontSize: 10,
          color: "#9ca3af",
          width: 46,
          textAlign: "right",
          flexShrink: 0,
          marginLeft: 4,
        }}
      >
        n={n}
      </span>
      <span
        style={{
          width: 58,
          textAlign: "center",
          flexShrink: 0,
          marginLeft: 6,
        }}
      >
        {isExpected && (
          <span
            style={{
              fontSize: 9,
              fontWeight: 700,
              color: domainColor,
              background: domainColor + "18",
              border: `1px solid ${domainColor}40`,
              padding: "1px 5px",
              borderRadius: 3,
              whiteSpace: "nowrap",
              letterSpacing: "0.02em",
            }}
          >
            expected
          </span>
        )}
      </span>
    </div>
  );
}

function getHeatColor(r) {
  const abs = Math.abs(r);
  const intensity = Math.min(abs / 0.6, 1);
  return `rgba(22, 163, 74, ${(intensity * 0.65).toFixed(2)})`;
}

                        color: "#9ca3af",
                        textTransform: "uppercase",
                        letterSpacing: "0.05em",
                      }}>
                        Scale
                      </th>
                      {allExternalMeasures.map((m) => {
                        const isOwnDomain = m.domain === domainKey;
                        return (
                          <th
                            key={m.key}
                            style={{
                              padding: "4px 6px",
                              fontSize: 10,
                              fontWeight: 600,
                              color: isOwnDomain ? "#000" : "#6b7280",
                              textAlign: "center",
                              background: isOwnDomain ? m.color + "10" : "transparent",
                              whiteSpace: "nowrap",
                            }}
                          >
                            {m.shortLabel}
                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {domainData.map((row) => {
                      const values = allExternalMeasures.map((m) => ({
                        key: m.key,
                        r: row[m.key],
                        domain: m.domain,
                        color: m.color,
                      }));
                      const maxR = Math.max(...values.map((v) => Math.abs(v.r)));
                      const expectedKeys = expectedCorrelations[row.variable] || [];

                      return (
                        <tr key={row.variable}>
                          <td style={{
                            padding: "5px 8px",
                            fontWeight: 500,
                            color: "#000",
                            whiteSpace: "nowrap",
                            borderTop: "1px solid #f3f4f6",
                          }}>
                            {(KAK_LABELS[row.variable] || row.variable).replace(/^[A-Z]+\d+[a-z]*:?\s*/, "")}
                            <span style={{ color: "#9ca3af", fontWeight: 400 }}>{" "}({row.variable})</span>
                          </td>
                          {values.map((v) => {
                            const isMax = Math.abs(v.r) === maxR;
                            const isExpected = expectedKeys.includes(v.key);
                            const isOwnDomain = v.domain === domainKey;
                            return (
                              <td
                                key={v.key}
                                style={{
                                  padding: isExpected ? "3px 4px" : "5px 6px",
                                  textAlign: "center",
                                  fontWeight: isMax ? 700 : 400,
                                  color: isMax ? "#000" : "#374151",
                                  background: isExpected
                                    ? `linear-gradient(${config.color}25, ${config.color}25), ${getHeatColor(v.r)}`
                                    : getHeatColor(v.r),
                                  borderTop: isExpected ? `3px solid ${config.color}` : "1px solid #f3f4f6",
                                  borderBottom: isExpected ? `3px solid ${config.color}` : "none",
                                  borderLeft: isExpected ? `3px solid ${config.color}` : isOwnDomain ? `1px solid ${config.color}30` : "none",
                                  borderRight: isExpected ? `3px solid ${config.color}` : isOwnDomain ? `1px solid ${config.color}30` : "none",
                                  fontSize: 12,
                                }}
                              >
                                {v.r.toFixed(2)}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              {config.discriminantNotes && (
              <div style={{ marginTop: 16 }}>
                <div style={{
                  fontSize: 12,
                  fontWeight: 600,
                  color: "#9ca3af",
                  marginBottom: 6,
                }}>
                  {config.discriminantNotes.title}
                </div>
                <ul style={{
                  margin: 0,
                  paddingLeft: 18,
                  fontSize: 13,
                  color: "#374151",
                  lineHeight: 1.7,
                  display: "flex",
                  flexDirection: "column",
                  gap: 6,
                }}>
                  {config.discriminantNotes.items.map((note, i) => (
                    <li key={i} dangerouslySetInnerHTML={{ __html: note }} />
                  ))}
                </ul>
              </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function ChartContent({ lang }) {
  const cfg = LANG_CONFIGS[lang];
  const [selectedExternal, setSelectedExternal] = useState(cfg.defaults);

  const handleSelect = (domain, measure) => {
    setSelectedExternal((prev) => ({ ...prev, [domain]: measure }));
  };

  return (
    <div>
      {Object.entries(cfg.domainConfig).map(([key, config]) => (
        <DomainSection
          key={key}
          domainKey={key}
          config={config}
          data={cfg.data}
          selectedExternal={selectedExternal}
          onSelectExternal={handleSelect}
          expectedCorrelations={cfg.expectedCorrelations}
          allExternalMeasures={cfg.allExternalMeasures}
          allMeasureGroups={cfg.allMeasureGroups}
        />
      ))}
    </div>
  );
}
