const BAR_SCALE_MAX = 0.7;

function getStrengthLabel(r) {
  const abs = Math.abs(r);
  if (abs >= 0.5) return "Strong";
  if (abs >= 0.3) return "Moderate";
  if (abs >= 0.1) return "Weak";
  return "Negligible";
}

function getStrengthColor(r, domainColor) {
  const abs = Math.abs(r);
  if (abs >= 0.5) return domainColor;
  if (abs >= 0.3) return domainColor + "cc";
  if (abs >= 0.1) return domainColor + "66";
  return "#e5e7eb";
}

function CorrelationBar({ r, p, n, maxWidth = 200, domainColor, isExpected }) {
  const abs = Math.abs(r);
  const width = (abs / BAR_SCALE_MAX) * maxWidth;
  const thresholdX = (0.3 / BAR_SCALE_MAX) * maxWidth;
  const sig = p < 0.05;
  const barColor = getStrengthColor(r, domainColor);

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div
        style={{
          width: maxWidth,
          height: 22,
          background: "#f3f4f6",
          borderRadius: 4,
          position: "relative",
          overflow: "hidden",
        }}
      >
        <div
          style={{
            width: Math.max(width, 2),
            height: "100%",
            background: barColor,
            borderRadius: 4,
            transition: "width 0.4s ease",
          }}
        />
        <div
          style={{
            position: "absolute",
            left: thresholdX,
            top: 0,
            bottom: 0,
            width: 0,
            borderLeft: "2px dashed #0A2A65",
            opacity: 0.45,
          }}
        />
      </div>
      <span
        style={{
          fontFamily: "'Inter', -apple-system, sans-serif",
          fontSize: 13,
          fontWeight: 600,
          color: sig ? "#000000" : "#9ca3af",
          minWidth: 48,
        }}
      >
        {r.toFixed(2)}
      </span>
      {!sig && (
        <span
          style={{
            fontSize: 10,
            color: "#d97706",
            fontWeight: 500,
            background: "#fef3c7",
            padding: "1px 5px",
            borderRadius: 3,
          }}
        >
          ns
        </span>
      )}
      <span style={{ fontSize: 10, color: "#9ca3af" }}>n={n}</span>
      {isExpected && (
        <span
          style={{
            fontSize: 9,
            fontWeight: 700,
            color: domainColor,
            background: domainColor + "18",
            border: `1px solid ${domainColor}40`,
            padding: "1px 5px",
            borderRadius: 3,
            whiteSpace: "nowrap",
            letterSpacing: "0.02em",
          }}
        >
          expected
        </span>
      )}
    </div>
  );
}
